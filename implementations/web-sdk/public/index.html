<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contentful Optimization – Vanilla JS</title>
    <link rel="stylesheet" href="/dist/theme.css" />
    <script>
      /* replaced by server */
    </script>
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
    <script src="/dist/contentful-optimization-web.umd.js"></script>
    <script src="/dist/contentful-optimization-web-components.umd.js"></script>
    <script src="/dist/contentful-optimization-web-preview-panel.umd.js"></script>
  </head>
  <body>
    <ctfl-optimization-root id="optimization-root">
      <div class="app-shell">
        <nav class="app-nav" id="app-nav"></nav>

        <div class="app-body">
          <aside class="app-sidebar">
            <section class="tracking-log" data-testid="analytics-events-container">
              <div class="tracking-log__header">
                <h2>Tracking</h2>
                <span class="tracking-log__badge">
                  <span data-testid="raw-events-count" id="raw-events-count">0</span> events
                </span>
              </div>
              <p class="tracking-log__empty" data-testid="no-events-message" id="no-events-message">
                No events tracked yet
              </p>
              <table class="tracking-log__table" id="tracking-table" style="display: none">
                <thead class="tracking-log__thead">
                  <tr>
                    <th>Type</th>
                    <th>Value</th>
                    <th>Dur</th>
                    <th>Age</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="tracking-tbody"></tbody>
              </table>
            </section>
          </aside>

          <main class="app-main" id="app-main"></main>
        </div>
      </div>
    </ctfl-optimization-root>

    <!-- ── Page templates ───────────────────────────────────────────── -->

    <template id="tpl-home">
      <div class="page-header">
        <h1>Web SDK – Vanilla JS</h1>
        <p class="page-header__subtitle">
          Reference implementation of @contentful/optimization-web
        </p>
      </div>

      <section class="control-panel" id="utility-panel">
        <h2 class="control-panel__title">Utilities</h2>
        <div class="control-panel__fields">
          <span
            class="control-panel__row-label"
            data-tooltip="SDK tracking is active only when consent is true"
            >Consent</span
          >
          <span class="control-panel__row-value" data-testid="consent-status" id="consent-status"
            >undefined</span
          >
          <span id="consent-actions"></span>

          <span
            class="control-panel__row-label"
            data-tooltip="User has been identified with a profile via the identify() call"
            >Identified</span
          >
          <span
            class="control-panel__row-value"
            data-testid="identified-status"
            id="identified-status"
            >No</span
          >
          <span id="identify-actions"></span>

          <span
            class="control-panel__row-label"
            data-testid="live-updates-status"
            data-tooltip="When ON, entries re-resolve and rerender on profile changes"
            >Live updates</span
          >
          <span
            class="control-panel__row-value"
            data-testid="global-live-updates-status"
            id="global-live-updates-status"
            >OFF</span
          >
          <button
            class="btn btn--sm btn--secondary"
            data-testid="toggle-global-live-updates-button"
            id="toggle-global-live-updates-button"
          >
            ON
          </button>

          <span
            class="control-panel__row-label"
            data-tooltip="Contentful preview panel is open — forces live updates regardless of the global toggle"
            >Preview panel</span
          >
          <span
            class="control-panel__row-value"
            data-testid="preview-panel-status"
            id="preview-panel-status"
            >Closed</span
          >
          <button
            class="btn btn--sm btn--secondary"
            data-testid="simulate-preview-panel-button"
            id="simulate-preview-panel-button"
          >
            Open Preview Panel
          </button>

          <span
            class="control-panel__row-label"
            data-testid="boolean-flag-status"
            data-tooltip="Value of the boolean feature flag from the SDK"
            >Flag "boolean"</span
          >
          <span class="control-panel__row-value" id="boolean-flag-value">undefined</span>
          <span></span>

          <span
            class="control-panel__row-label"
            data-tooltip="Number of selected optimization variants currently applied"
            >Active optimizations</span
          >
          <span
            class="control-panel__row-value"
            data-testid="selected-optimizations-count"
            id="selected-optimizations-count"
            >0</span
          >
          <span></span>
        </div>
      </section>

      <section class="page-section" data-testid="live-updates-section">
        <header class="page-section__header">
          <h2>Live Updates</h2>
          <p>Toggle global live updates and identify the user to verify how entries update.</p>
        </header>
        <div class="sections-grid" data-testid="live-updates-examples">
          <div data-testid="live-updates-default">
            <ctfl-optimized-entry
              data-entry-id="2Z2WLOx07InSewC3LUB3eX"
              data-live-updates-prefix="live-default"
            ></ctfl-optimized-entry>
          </div>
          <div data-testid="live-updates-enabled">
            <ctfl-optimized-entry
              data-entry-id="2Z2WLOx07InSewC3LUB3eX"
              data-live-updates-prefix="live-enabled"
              live-updates="true"
            ></ctfl-optimized-entry>
          </div>
          <div data-testid="live-updates-locked">
            <ctfl-optimized-entry
              data-entry-id="2Z2WLOx07InSewC3LUB3eX"
              data-live-updates-prefix="live-locked"
              live-updates="false"
            ></ctfl-optimized-entry>
          </div>
        </div>
      </section>

      <div class="sections-grid sections-grid--split">
        <section class="page-section">
          <header class="page-section__header"><h2>Auto Observed Entries</h2></header>
          <div class="entry-grid" id="auto-observed"></div>
        </section>
        <section class="page-section">
          <header class="page-section__header"><h2>Manually Observed Entries</h2></header>
          <div class="entry-grid" id="manually-observed"></div>
        </section>
      </div>
    </template>

    <template id="tpl-page-two">
      <div data-testid="page-two-view">
        <div class="page-header">
          <a data-testid="link-back-home" href="/">Back to Home</a>
          <h1>Page Two</h1>
          <p class="page-header__subtitle">
            Demo route for SPA navigation and conversion-style tracking.
          </p>
        </div>

        <section class="control-panel" id="utility-panel-p2">
          <h2 class="control-panel__title">Utilities</h2>
          <div class="control-panel__fields">
            <span
              class="control-panel__row-label"
              data-tooltip="SDK tracking is active only when consent is true"
              >Consent</span
            >
            <span
              class="control-panel__row-value"
              data-testid="consent-status"
              id="consent-status-p2"
              >undefined</span
            >
            <span id="consent-actions-p2"></span>

            <span
              class="control-panel__row-label"
              data-tooltip="User has been identified with a profile via the identify() call"
              >Identified</span
            >
            <span
              class="control-panel__row-value"
              data-testid="identified-status"
              id="identified-status-p2"
              >No</span
            >
            <span id="identify-actions-p2"></span>

            <span
              class="control-panel__row-label"
              data-testid="live-updates-status"
              data-tooltip="When ON, entries re-resolve and rerender on profile changes"
              >Live updates</span
            >
            <span
              class="control-panel__row-value"
              data-testid="global-live-updates-status"
              id="global-live-updates-status-p2"
              >OFF</span
            >
            <button
              class="btn btn--sm btn--secondary"
              data-testid="toggle-global-live-updates-button"
              id="toggle-global-live-updates-button-p2"
            >
              ON
            </button>

            <span
              class="control-panel__row-label"
              data-tooltip="Contentful preview panel is open — forces live updates regardless of the global toggle"
              >Preview panel</span
            >
            <span
              class="control-panel__row-value"
              data-testid="preview-panel-status"
              id="preview-panel-status-p2"
              >Closed</span
            >
            <button
              class="btn btn--sm btn--secondary"
              data-testid="simulate-preview-panel-button"
              id="simulate-preview-panel-button-p2"
            >
              Open Preview Panel
            </button>

            <span
              class="control-panel__row-label"
              data-testid="boolean-flag-status"
              data-tooltip="Value of the boolean feature flag from the SDK"
              >Flag "boolean"</span
            >
            <span class="control-panel__row-value" id="boolean-flag-value-p2">undefined</span>
            <span></span>

            <span
              class="control-panel__row-label"
              data-tooltip="Number of selected optimization variants currently applied"
              >Active optimizations</span
            >
            <span
              class="control-panel__row-value"
              data-testid="selected-optimizations-count"
              id="selected-optimizations-count-p2"
              >0</span
            >
            <span></span>
          </div>
          <div class="control-panel__actions">
            <button
              class="btn btn--secondary btn--sm"
              data-testid="track-conversion-button"
              id="track-conversion-button"
            >
              Trigger custom view event
            </button>
          </div>
        </section>

        <div class="sections-grid sections-grid--split" data-testid="page-two-optimization">
          <section class="page-section">
            <header class="page-section__header"><h2>Auto-observed</h2></header>
            <div class="entry-grid" id="page-two-auto-grid"></div>
          </section>
          <section class="page-section">
            <header class="page-section__header"><h2>Manually-observed</h2></header>
            <div class="entry-grid" id="page-two-manual-grid"></div>
          </section>
        </div>
      </div>
    </template>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
