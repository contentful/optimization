# Mirrors PreviewPanelOverridesTests.testScenario4SettingVariantOverrideToZeroRendersBaseline
# — explicitly picking the index-0 (baseline) variant forces the experience to render its
# baseline entry even though the visitor qualifies for a non-baseline variant.
appId: ${APP_ID}
---
- launchApp:
    clearState: true
- assertVisible:
    id: 'identify-button'
- tapOn:
    id: 'identify-button'
- extendedWaitUntil:
    visible:
      id: 'reset-button'
    timeout: 30000
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: 'reset-button'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'entry-text-5a8ONfBdanJtlJ39WWnH1w'
    direction: DOWN
- tapOn: 'preview-panel-fab'
- assertVisible: 'Preview Panel'
- extendedWaitUntil:
    notVisible:
      text: '.*Loading definitions.*'
    timeout: 30000
# Expand the target audience, then pick variant index 0 (baseline) for its experience.
- scrollUntilVisible:
    element:
      text: 'audience-expand-4yIqY7AWtzeehCZxtQSDB'
    direction: DOWN
- tapOn:
    text: 'audience-expand-4yIqY7AWtzeehCZxtQSDB'
- scrollUntilVisible:
    element:
      text: 'variant-picker-7DyidZaPB7Jr1gWKjoogg0-0'
    direction: DOWN
- tapOn:
    text: 'variant-picker-7DyidZaPB7Jr1gWKjoogg0-0'
- back
- scrollUntilVisible:
    element:
      id: 'entry-text-5i4SdJXw9oDEY0vgO7CwF4'
    direction: DOWN
