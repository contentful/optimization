# Mirrors OfflineBehaviorTests.testRecoverGracefullyWhenNetworkRestored — the SDK goes
# offline then online, identifies, and the identified profile persists across a relaunch:
# on the rehydrated cold start the identified nested variant resolves and the anonymous
# baseline entry does not.
appId: ${APP_ID}
---
# Start online and from a clean anonymous profile (mirrors the beforeEach). Starting with
# airplane mode off also resets any leftover offline state from a prior failed flow.
- setAirplaneMode: disabled
- launchApp:
    clearState: true
- assertVisible:
    id: 'identify-button'
# Drop the network, then restore it — the SDK must recover, not wedge.
- setAirplaneMode: enabled
- setAirplaneMode: disabled
# Identify online; reset-button replacing identify-button signals the pipeline completed.
- tapOn:
    id: 'identify-button'
- extendedWaitUntil:
    visible:
      id: 'reset-button'
    timeout: 30000
# Relaunch from stored state (no clearState). reset-button reappearing proves the
# identified profile survived the cold start (same gate IdentifiedVariantsTests uses).
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: 'reset-button'
    timeout: 30000
# The identified nested variant resolves on the rehydrated start...
- scrollUntilVisible:
    element:
      id: 'entry-text-2KIWllNZJT205BwOSkMINg'
    direction: DOWN
# ...and the anonymous baseline nested entry must NOT exist.
- assertNotVisible:
    id: 'entry-text-1JAU028vQ7v6nB2swl3NBo'
