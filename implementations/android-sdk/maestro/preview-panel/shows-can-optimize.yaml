# Mirrors PreviewPanelTests.testShowsCanOptimize - the debug canOptimize row
# shows "Yes". Scroll it into view, then assert the rendered status text.
appId: ${APP_ID}
---
- stopApp
- launchApp:
    arguments:
      reset: true
- assertVisible:
    id: 'identify-button'
- tapOn: 'preview-panel-fab'
- assertVisible: 'Preview Panel'
- scrollUntilVisible:
    element: 'debug-can-optimize'
    direction: DOWN
- assertVisible: '.*Yes.*'
