# Mirrors LiveUpdatesTests.testTogglePreviewPanel — the simulated preview panel flips
# Closed -> Open -> Closed.
appId: ${APP_ID}
---
- stopApp
- launchApp:
    arguments:
      reset: true
- assertVisible:
    id: 'identify-button'
- tapOn:
    id: 'live-updates-test-button'
- assertVisible: 'default-personalization'
- assertVisible:
    id: 'preview-panel-status'
    text: 'Closed'
- tapOn:
    id: 'simulate-preview-panel-button'
- assertVisible:
    id: 'preview-panel-status'
    text: 'Open'
- tapOn:
    id: 'simulate-preview-panel-button'
- assertVisible:
    id: 'preview-panel-status'
    text: 'Closed'
