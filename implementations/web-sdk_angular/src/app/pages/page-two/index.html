<div data-testid="page-two-view">
  <div class="page-header">
    <a data-testid="link-back-home" routerLink="/">Back to Home</a>
    <h1>Page Two</h1>
    <p class="page-header__subtitle">Multi-route demo — SDK state persists across navigation.</p>
  </div>

  <app-control-panel [onTrackConversion]="trackConversion" />

  @if (entries.isLoading()) {
  <p class="page-loading" data-testid="page-two-loading">Loading entries…</p>
  } @else {
  <div class="sections-grid sections-grid--split">
    @if (autoEntry(); as entry) {
    <section class="page-section">
      <header class="page-section__header">
        <h2>Auto-observed</h2>
      </header>
      <div class="entry-grid">
        <app-entry-card [entry]="entry" />
      </div>
    </section>
    } @if (manualEntry(); as entry) {
    <section class="page-section">
      <header class="page-section__header">
        <h2>Manually-observed</h2>
      </header>
      <div class="entry-grid">
        <app-entry-card [entry]="entry" [manualTracking]="true" />
      </div>
    </section>
    }
  </div>
  }
</div>
