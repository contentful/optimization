name: Notify Slack

permissions:
  contents: read
  pull-requests: read

on:
  pull_request_target:
    types: [closed]
    branches: [main]
    paths:
      - 'documentation/**'
      - 'packages/**'

jobs:
  notify:
    name: Notify Slack
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Classify changes
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          trap 'echo "Classify changes failed at line ${LINENO}: ${BASH_COMMAND}" >&2' ERR

          changed_files="$(
            gh api --paginate "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" \
              --jq '.[] | [.filename, .status] | @tsv'
          )"

          has_docs=false
          has_packages=false
          changed_packages=""
          package_manifests="$(find packages -name package.json -not -path '*/node_modules/*' -print | sort)"

          add_package() {
            local package="$1"

            if ! grep --fixed-strings --line-regexp --quiet "$package" <<< "$changed_packages"; then
              changed_packages="${changed_packages}${package}"$'\n'
            fi
          }

          package_name_for_file() {
            local file="$1"
            local best_name=""
            local best_path=""
            local manifest package_name package_path

            while IFS= read -r manifest; do
              [ -n "$manifest" ] || continue

              package_path="${manifest%/package.json}"
              case "$file" in
                "$package_path" | "$package_path"/*)
                  if [ ${#package_path} -gt ${#best_path} ]; then
                    package_name="$(jq -r '.name // empty' "$manifest")"

                    if [ -n "$package_name" ]; then
                      best_name="$package_name"
                      best_path="$package_path"
                    fi
                  fi
                  ;;
              esac
            done <<< "$package_manifests"

            if [ -n "$best_name" ]; then
              printf '%s\n' "$best_name"
            fi
          }

          while IFS=$'\t' read -r file status; do
            case "$file" in
              documentation/concepts/README.md | documentation/guides/README.md)
                ;;
              documentation/concepts/*.md | documentation/guides/*.md)
                case "$status" in
                  added | modified)
                    has_docs=true
                    ;;
                esac
                ;;
              packages/*)
                has_packages=true

                package_name="$(package_name_for_file "$file")"
                if [ -n "$package_name" ]; then
                  add_package "$package_name"
                fi
                ;;
            esac
          done <<< "$changed_files"

          if [ "$has_docs" != "true" ] && [ "$has_packages" != "true" ]; then
            echo "notify=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          package_list="$(
            printf '%s' "$changed_packages" \
              | sed '/^$/d' \
              | awk '{ print "• `" $0 "`" }'
          )"

          if [ "$has_docs" = "true" ] && [ "$has_packages" = "true" ]; then
            message_title="📝📦 Documentation and packages just landed"
            message_body="Documentation has been updated, and package changes were merged. @TECH_WRITER@, fresh docs goodness just landed for your reading list!"
          elif [ "$has_packages" = "true" ]; then
            message_title="📦 Package changes just landed"
            message_body="Package updates were merged. Fresh bits are ready for the next build!"
          else
            message_title="📝 Documentation just landed"
            message_body="Documentation has been updated. @TECH_WRITER@, fresh docs goodness just landed for your reading list!"
          fi

          {
            echo "notify=true"
            echo "message_title=$message_title"
            echo "message_body=$message_body"
            echo "package_list<<EOF"
            echo "$package_list"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: steps.changes.outputs.notify == 'true'
        env:
          CHANGED_PACKAGES: ${{ steps.changes.outputs.package_list }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login || github.actor }}
          MESSAGE_BODY: ${{ steps.changes.outputs.message_body }}
          MESSAGE_TITLE: ${{ steps.changes.outputs.message_title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SLACK_TECH_WRITER_ID: ${{ secrets.SLACK_TECH_WRITER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          message_body="$MESSAGE_BODY"

          if [[ "$message_body" == *"@TECH_WRITER@"* ]]; then
            if [ -z "$SLACK_TECH_WRITER_ID" ]; then
              echo "SLACK_TECH_WRITER_ID is required for documentation notifications." >&2
              exit 1
            fi

            tech_writer_mention="<@${SLACK_TECH_WRITER_ID}>"
            message_body="${message_body//@TECH_WRITER@/$tech_writer_mention}"
          fi

          payload="$(
            jq -n \
              --arg message_title "$MESSAGE_TITLE" \
              --arg message_body "$message_body" \
              --arg changed_packages "$CHANGED_PACKAGES" \
              --arg merged_by "$MERGED_BY" \
              --arg pr_number "#${PR_NUMBER}" \
              --arg pr_title "$PR_TITLE" \
              --arg pr_url "$PR_URL" \
              '{
                text: "\($message_title): \($pr_title)",
                blocks: ([
                    {
                      type: "section",
                      text: {
                        type: "mrkdwn",
                        text: "*\($message_title)*\n\($message_body)"
                      }
                    },
                    {
                      type: "section",
                      fields: [
                        {
                          type: "mrkdwn",
                          text: "*Pull request:*\n<\($pr_url)|\($pr_number)> \($pr_title)"
                        },
                        {
                          type: "mrkdwn",
                          text: "*Merged by:*\n\($merged_by)"
                        }
                      ]
                    }
                  ] + (
                  if $changed_packages == "" then
                    []
                  else
                    [
                      {
                        type: "section",
                        text: {
                          type: "mrkdwn",
                          text: "*Changed packages:*\n\($changed_packages)"
                        }
                      }
                    ]
                  end
                ))
              }'
          )"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
