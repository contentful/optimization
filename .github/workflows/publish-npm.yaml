name: Publish to NPM

permissions:
  contents: read
  id-token: write
  packages: write

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (e.g. v1.2.3)'
        required: true
      publish:
        description: 'Actually publish'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Retrieve Secrets from Vault
        id: vault
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          url: ${{ secrets.VAULT_URL }}
          role: ${{ github.event.repository.name }}-github-action
          method: jwt
          path: github-actions
          secrets: |
            secret/data/github/github_packages_write GITHUB_PACKAGES_WRITE_TOKEN | GITHUB_PACKAGES_WRITE_TOKEN;

      - name: Derive release version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG='${{ github.event.release.tag_name }}'
          else
            TAG='${{ inputs.tag }}'
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - run: |
          pnpm install --prefer-offline --frozen-lockfile

      - name: Bump package.json versions
        run: |
          pnpm -r --filter "@contentful/optimization-*" exec \
            npm --no-git-tag-version --force version "$RELEASE_VERSION"
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

      - name: Build
        run: pnpm build
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

      - name: Prepare package READMEs for publish
        run: pnpm -r --filter "@contentful/optimization-*" exec build-tools rewrite-readme prepare
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Create packages for troubleshooting
        run: pnpm pack --filter "@contentful/optimization-*" --pack-destination pkgs

      - name: Upload packages for troubleshooting
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-optimization-sdk-packages
          path: |
            ./pkgs/
          retention-days: 3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@contentful'
          package-manager-cache: false

      - name: Publish
        if: github.event_name == 'release' || inputs.publish
        run: pnpm -r --filter "@contentful/optimization-*" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ steps.vault.outputs.GITHUB_PACKAGES_WRITE_TOKEN }}

      - name: Restore package READMEs after publish
        if: always()
        run: pnpm -r --filter "@contentful/optimization-*" exec build-tools rewrite-readme restore
